name: Check Grades

on:
  schedule:
    - cron: '0 2,5,8,11,13,23 15-31 12 *'   # 12月15-31日
    - cron: '0 2,5,8,11,13,23 1-15 1 *'      # 1月1-15日
    - cron: '0 2,5,8,11,13,23 15-30 6 *'     # 6月15-30日
    - cron: '0 2,5,8,11,13,23 1-15 7 *'      # 7月1-15日
  workflow_dispatch:         # 允许在 Actions 页面手动触发，方便调试

permissions:
  contents: write             # 需要写权限才能 commit 回仓库

jobs:
  check-grades:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 pycryptodome cryptography python-dotenv

      - name: Run grade checker
        env:
          STUID: ${{ secrets.STUID }}
          PASSW: ${{ secrets.PASSW }}
          ENCRYPT: ${{ secrets.ENCRYPT }}
          QQMAIL: ${{ secrets.QQMAIL }}
          SMTPCODE: ${{ secrets.SMTPCODE }}
          TOMAIL: ${{ secrets.TOMAIL }}
          SERVER_KEY: ${{ secrets.SERVER_KEY }}
        run: python main.py

      - name: Commit updated grades.enc
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add grades.enc
          git diff --staged --quiet && echo "No changes to commit" || git commit -m "chore: update grades snapshot [skip ci]"
          git push